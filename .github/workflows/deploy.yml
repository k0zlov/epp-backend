name: Deploy EPP Server

on:
  push:
    branches: [ prod ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
      - name: Install dependencies
        run: dart pub get
      - name: Run tests
        run: dart test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /app/epp-backend
            cd /app/epp-backend
            
            if [ ! -d ".git" ]; then
              git clone -b prod https://github.com/${{ github.repository }}.git .
            else
              git pull origin prod
            fi
            
            echo "${{ secrets.ENV_FILE }}" > .env
            
            if ! docker compose up -d --build; then
              echo "Docker build failed"
              exit 1
            fi
            
            sleep 10
            
            CONTAINER_NAME=$(docker compose ps -q epp-server)
            if [ -z "$CONTAINER_NAME" ] || [ "$(docker inspect -f '{{.State.Running}}' $CONTAINER_NAME)" != "true" ]; then
              echo "Container epp-server is not running. Printing logs:"
              docker compose logs epp-server
              exit 1
            fi
            
            docker image prune -f